<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login / Register</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body {
    height: 100vh;
    margin: 0;
    display: block;
    justify-content: center;
    align-items: center;
    background: whitesmoke;
    overflow: hidden; /* 🔥 prevents scrolling */
}

.container {
    width: 100%;
    display: flex;
    justify-content: center;
}
input {
    width: 100%;
    padding: 12px; /* bigger */
    margin: 20px 0;
    border-radius: 8px;
    border: none;
    background: #eee;
}

.box {
    background: #ffffff;
    padding: 40px; /* 🔥 bigger padding */
    width: 400px;  /* 🔥 increased width */
    max-width: 90%; /* responsive */
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}
form { display:none; }
form.active { display:block; }

input {
    width:100%;
    padding:10px;

    margin-bottom: 20px;
    border-radius:8px;
    border:none;
    background:#eee;
}

button {
    width:100%;
    margin-top: 20px;
    padding:10px;
    border:none;
    border-radius:20px;
    background:linear-gradient(to right,#00c6ff,#ff00cc);
    color:white;
    cursor:pointer;
}

/* Floating button */
.dev-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;

    width: auto;        
    padding: 8px 14px;    
    
    border: none;
    border-radius: 20px;
    background: #333;
    color: white;
    cursor: pointer;
    
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
/* Popup */
.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: white;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    width: 300px;
}

.toggle {
    margin-top:25px;
    cursor:pointer;
    color:rgb(26, 81, 164);
}
h1
{
    margin-bottom: 20px;
}
#logo
{
    position: a;
    bottom: 0px;
    margin-bottom: auto;
}
</style>
</head>

<body>

    <button id="devBtn" class="dev-btn">Developer Info</button>

    <div id="devPopup" class="popup">
    <div class="popup-content">
        <h2>Developer Info</h2>
        <br>

        <p><b>Frontend:</b><br>
        Binnathik<br>
        Gokul<br>
        Tamiz<br>
        Jayasuriya</p>
        <br>

        <p><b>Backend:</b><br>
        Santhaseelan</p>

        <button onclick="closePopup()">Close</button>
    </div>
</div>

     <div id="logo">
        <center>
            <img src="logo.png" alt="Logo" height="200px">
        </center>
    </div>
    

<div class="container">
   

    <div class="box">

        <!-- LOGIN -->
         <h1 id="title" style="color: rgb(0, 0, 0);">Login</h1>
        <form id="loginForm" class="active">
            <input id="loginEmail" type="text" placeholder="Enter your spicy Email ID" required>
            <input id="loginPassword" type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <!-- REGISTER -->
        <form id="registerForm">
            <input id="regNum" type="text" placeholder="Mobile number" required><br>
            <input id="regEmail" type="email" placeholder="Email" required><br>
            <input id="regPassword" type="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>

        <div class="toggle" id="toggleText">Don't have an account? Sign Up</div>

    </div>
</div>


<script>

    const devBtn = document.getElementById("devBtn");
const devPopup = document.getElementById("devPopup");

devBtn.onclick = () => {
    devPopup.style.display = "flex";
};

function closePopup() {
    devPopup.style.display = "none";
}


const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");
const toggleText = document.getElementById("toggleText");
const title = document.getElementById("title");

let isLogin = true;

// 🔄 Toggle
toggleText.onclick = () => {
    isLogin = !isLogin;

    loginForm.classList.toggle("active");
    registerForm.classList.toggle("active");

    title.textContent = isLogin ? "Login" : "Register";
    toggleText.textContent = isLogin 
        ? "Don't have an account? Sign Up"
        : "Already have an account? Login";
};



// 🔥 REGISTER
registerForm.onsubmit = async (e) => {
    e.preventDefault();

    const name = document.getElementById("regNum").value;
    const email = document.getElementById("regEmail").value;
    const password = document.getElementById("regPassword").value;

    const res = await fetch("/register", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ name, email, password })
    });

    const data = await res.json();

    if(data.uid){
        
        alert("Registered successfully");
        toggleText.click(); // go to login
    } else {
        alert(data.error);
    }
};



loginForm.onsubmit = async (e) => {
    e.preventDefault();

    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.token) {
    localStorage.setItem("token", data.token);
    localStorage.setItem("userId", data.uid);
    if(email === "admin@gmail.com" && password === "admin123"){
        window.location.href = "/adminhome";
    } else {
        window.location.href = "/customerhome";
        
    }

} else {
    console.log("ERROR:", data);

    alert(data.error?.message || "Login failed");
}
};
window.addEventListener("load", () => {
    // Set default balance
    if (localStorage.getItem("balance") === null) {
        let balance = 2000;
        localStorage.setItem("balance", JSON.stringify(balance)); // ✅ safe
        console.log(balance, "Balance");
    }
});

</script>

</body>
</html>
